stages:
  - stage: Terraform
    displayName: Terraform
    jobs:
      - job: Terraform
        displayName: Run Terraform stage
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: echo "Terraform stage template will be added here."
            displayName: Terraform placeholder

  - stage: Kubernetes
    displayName: Kubernetes
    dependsOn: Terraform
    jobs:
      - job: Kubernetes
        displayName: Run Kubernetes stage
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: echo "Kubernetes stage template will be added here."
            displayName: Kubernetes placeholder

